# Orquestación local que simula el entorno productivo.
#
#   localstack -> servicios AWS (S3, Secrets Manager)
#   postgres   -> pgvector (representa RDS PostgreSQL en producción)
#   redis      -> memoria a corto plazo (representa ElastiCache)
#   api        -> FastAPI (el RAG)
#   nginx      -> reverse proxy + servir frontend (capa frontal de seguridad)

services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566" # Abre el 4566 de MI WINDOWS y conectalo al 4566 de mi contenedor
    environment:
      - SERVICES=s3,secretsmanager
      - DEBUG=0
      # Pasamos la clave de OpenAI para guardarla en Secrets Manager al arrancar
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-placeholder}
    volumes:
      # Scripts de bootstrap (se ejecutan cuando LocalStack está listo)
      - ./infra/localstack/init:/etc/localstack/init/ready.d
      # Montamos el PDF para poder subirlo a S3 desde el bootstrap
      - ./data:/data:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-rag}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ragpass}
      - POSTGRES_DB=${POSTGRES_DB:-ragdb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # Sobrescribimos los hosts para la red interna de docker-compose
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:-ragpass}@postgres:5432/${POSTGRES_DB:-ragdb}
      - REDIS_URL=redis://redis:6379/0
      - AWS_ENDPOINT_URL=http://localstack:4566
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    expose:
      - "8000" # el 8000 solo es visible DENTRO de la red de Docker

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  pgdata:
